name: Recipes

on:
  push:
    branches: [main]
    paths:
      - "recipes/**"
      - ".github/scripts/**"
      - ".github/workflows/recipes.yml"
  pull_request:
    paths:
      - "recipes/**"

permissions:
  contents: write

jobs:
  validate:
    name: Validate recipes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate front matter
        run: python .github/scripts/validate_recipes.py

  update-index:
    name: Update index
    needs: validate
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install pyyaml

      - name: Regenerate README and recipes.json
        run: python .github/scripts/update_index.py

      - name: Commit updated index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md recipes.json
          git diff --staged --quiet || git commit -m "chore: update recipe index [skip ci]"
          git push
